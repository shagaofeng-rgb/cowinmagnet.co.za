<!doctype html>
<html lang="en-ZA">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Cowinmagnet Admin Login</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="login-screen">
  <main class="login-card">
    <span class="brand-mark">C</span>
    <p class="eyebrow">Website Data Backend</p>
    <h1>Cowinmagnet Africa Admin</h1>
    <p>Use the same login flow as the main Cowinmagnet backend.</p>
    <form data-login-form action="/api/admin/login" method="post">
      <label>Email<input name="email" type="email" autocomplete="username" required value="davidsha@cowinmagnet.com"></label>
      <label>Password<input name="password" type="password" autocomplete="current-password" required></label>
      <button class="button primary" type="submit">Sign In</button>
      <output data-status></output>
    </form>
  </main>
  <script src="/admin/admin.js"></script>
</body>
</html>
