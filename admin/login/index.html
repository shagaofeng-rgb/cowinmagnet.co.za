<!doctype html>
<html lang="en-ZA">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Cowinmagnet Admin Login</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="login-screen">
  <main class="login-card">
    <span class="brand-mark">C</span>
    <p class="eyebrow">Local CMS</p>
    <h1>Cowinmagnet Admin</h1>
    <p>Manage the South Africa and Africa local preview content.</p>
    <form data-login-form>
      <label>Username<input name="username" autocomplete="username" required value="admin"></label>
      <label>Password<input name="password" type="password" autocomplete="current-password" required></label>
      <button class="button primary" type="submit">Sign In</button>
      <output data-status></output>
    </form>
  </main>
  <script src="/admin/admin.js"></script>
</body>
</html>
