<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Cowinmagnet Africa 管理后台</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="admin-shell">
  <aside class="sidebar">
    <a class="brand" href="/admin/">
      <img class="brand-logo" src="/assets/images/cowinmagnet-logo.jpg" alt="Cowinmagnet logo" width="42" height="42">
      <span><strong data-i18n="adminTitle">Cowinmagnet Africa</strong><small>管理后台</small></span>
    </a>
    <nav aria-label="Admin modules">
      <button data-view="dashboard" class="active"></button>
      <button data-view="categories"></button>
      <button data-view="products"></button>
      <button data-view="news"></button>
      <button data-view="forms"></button>
      <button data-view="analytics"></button>
      <button data-view="seo"></button>
      <button data-view="media"></button>
      <button data-view="users"></button>
      <button data-view="sync"></button>
      <button data-view="logs"></button>
      <button data-view="settings"></button>
    </nav>
    <div class="sidebar-footer">
      <small data-i18n="accountLabel">当前账号</small>
      <strong data-user-email></strong>
      <button class="button secondary" data-logout></button>
    </div>
  </aside>
  <main class="admin-main">
    <header class="admin-topbar">
      <div>
        <p class="eyebrow" data-section-kicker>Cowinmagnet Africa</p>
        <h1 data-section-title></h1>
        <p data-section-desc></p>
      </div>
      <div class="topbar-actions">
        <a class="button secondary" href="/en-za/" target="_blank" rel="noopener" data-i18n="viewSite"></a>
        <button class="button primary" data-refresh></button>
      </div>
    </header>
    <div class="notice" data-status></div>
    <section data-panel="dashboard" class="admin-panel active"></section>
    <section data-panel="categories" class="admin-panel"></section>
    <section data-panel="products" class="admin-panel"></section>
    <section data-panel="news" class="admin-panel"></section>
    <section data-panel="forms" class="admin-panel"></section>
    <section data-panel="analytics" class="admin-panel"></section>
    <section data-panel="seo" class="admin-panel"></section>
    <section data-panel="media" class="admin-panel"></section>
    <section data-panel="users" class="admin-panel"></section>
    <section data-panel="sync" class="admin-panel"></section>
    <section data-panel="logs" class="admin-panel"></section>
    <section data-panel="settings" class="admin-panel"></section>
  </main>
  <script src="/admin/admin-v2.js"></script>
</body>
</html>
